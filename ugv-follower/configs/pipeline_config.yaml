# Pipeline feature toggles
dev_or_pi: "dev"           # Target runtime environment: "dev" or "pi"
inference_enabled: true    # Run YOLO person detection on each frame (requires YOLO model weights downloaded into the models/ directory)
live_view_enabled: true    # Show camera feed in OpenCV window (disable for headless Pi)
recording_enabled: false   # Record camera feed to disk
output_dir: "output/"      # Output directory (relative to package root)
