# OAK-D Lite camera settings
camera:
  colour_resolution: [1920, 1080]  # Colour camera output resolution [width, height]
  fps: 30                          # Target frame rate

# LiDAR settings
lidar:
  port: "/dev/ttyUSB0"    # Serial port the LiDAR is connected to
  baud_rate: 230400       # D500 serial baud rate
# UGV Rover settings
ugv:
  port: "/dev/ttyAMA0"    # Pi 5; use /dev/serial0 for Pi 4B
  baud_rate: 115200       # Sub-controller default baud rate
  chassis_main: 2         # 1=RaspRover, 2=UGV Rover 6WD, 3=UGV Beast tracked
  chassis_module: 0       # 0=no module, 1=arm, 2=pan-tilt
  track_width: 0.3        # Wheel centre-to-centre distance in metres (approx; confirm from spec)