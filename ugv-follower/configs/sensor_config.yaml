# OAK-D Lite camera settings
camera:
  colour_resolution: [1920, 1080]  # Colour camera output resolution [width, height]
  fps: 30                          # Target frame rate

# LiDAR settings
lidar:
  port: "/dev/ttyUSB0"    # Serial port the LiDAR is connected to
  baud_rate: 230400       # D500 serial baud rate
  mounting_offset_deg: 270  # Direction LiDAR 0° points in rover frame (rover forward = 0°)
  forward_displacement_m: 0.038  # LiDAR origin forward of rover body centre (metres; approx 1 inch — measure precisely and update)
# UGV Rover settings
ugv:
  port: "/dev/ttyAMA0"    # Pi 5; use /dev/serial0 for Pi 4B
  baud_rate: 115200       # Sub-controller default baud rate
  chassis_main: 2         # 1=RaspRover, 2=UGV Rover 6WD, 3=UGV Beast tracked
  chassis_module: 2       # 0=no module, 1=arm, 2=pan-tilt
  track_width: 0.175        # Wheel centre-to-centre distance in metres (approx; confirm from spec)

# Controller-level command shaping — prevents abrupt wheel speed reversals.
# Leave disabled (or omit entirely) when running calibration scripts.
# Enable in the autonomous follower pipeline only.
#
# ugv_command_shaping:
#   enabled: true               # Set true only for the follow-me pipeline
#   update_rate_hz: 50.0        # Shaper loop frequency (50 Hz is fine at 115200 baud)
#   ramp_rate_per_s: 2.0        # Max wheel speed change per second (m/s per s)
#   reversal_dwell_s: 0.05      # Hold-at-zero time before reversing (seconds)
#   zero_crossing_epsilon: 0.01 # Speeds <= this (m/s) treated as zero

# Waveshare RGB (pan-tilt) camera — intrinsic calibration results
# Populated by calibrate_waveshare_camera.py after running the calibration workflow.
waveshare_rgb:
  model: "fisheye"                # fisheye or pinhole — set after calibration
  camera_matrix: [[812.62, 0.0, 1002.92], [0.0, 814.07, 567.80], [0.0, 0.0, 1.0]] # 3x3 K matrix (row-major) — set after calibration
  dist_coeffs: [0.042287176079693914, -0.03351504621552974, 0.008025571747576593, -0.0022739457747216188] # [k1, k2, k3, k4] fisheye distortion vector — set after calibration
  resolution: [1920, 1080]  # [width, height] at calibration time
  rms_reprojection_error: 0.1277  # RMS error in pixels — set after calibration

