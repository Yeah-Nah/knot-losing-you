# OAK-D Lite camera settings
camera:
  colour_resolution: [1920, 1080]  # Colour camera output resolution [width, height]
  fps: 30                          # Target frame rate

# LiDAR settings
lidar:
  port: "/dev/ttyUSB0"    # Serial port the LiDAR is connected to
  baud_rate: 230400       # D500 serial baud rate
# UGV Rover settings
ugv:
  port: "/dev/ttyAMA0"    # Pi 5; use /dev/serial0 for Pi 4B
  baud_rate: 115200       # Sub-controller default baud rate
  chassis_main: 2         # 1=RaspRover, 2=UGV Rover 6WD, 3=UGV Beast tracked
  chassis_module: 2       # 0=no module, 1=arm, 2=pan-tilt
  track_width: 0.3        # Wheel centre-to-centre distance in metres (approx; confirm from spec)

# Waveshare RGB (pan-tilt) camera — intrinsic calibration results
# Populated by calibrate_waveshare_camera.py after running the calibration workflow.
waveshare_rgb:
  model: "fisheye"                # fisheye or pinhole — set after calibration
  camera_matrix: [[542.44, 0.0, 672.07],
                  [0.0, 544.64, 379.80],
                  [0.0, 0.0, 1.0]]        # 3x3 K matrix (row-major) — set after calibration
  dist_coeffs: [0.04838097993620094, -0.041844537572354824, 0.012958617562528365, -0.0031300600380237465]          # [k1, k2, k3, k4] fisheye distortion vector — set after calibration
  resolution: [1280, 720]   # [width, height] at calibration time
  rms_reprojection_error: 0.7737  # RMS error in pixels — set after calibration

  # Images used   : 59
  # Resolution    : 1280×720 px
  # RMS error     : 0.7737 px
  # fx, fy        : 542.44, 544.64
  # cx, cy        : 672.07, 379.80
  # dist_coeffs   : [0.04838097993620094, -0.041844537572354824, 0.012958617562528365, -0.0031300600380237465]  # [k1, k2, k3, k4]

# Extrinsic calibration — LiDAR ↔ pan-tilt angular offset
# Populated by calibrate_angular_offset.py after running the calibration workflow.
extrinsic:
  lidar_to_pantilt_offset_deg: null  # signed degrees (−180, +180] — set after calibration
  calibration_method: null           # angular_offset — set after calibration
  target_distance_m: null            # target distance used during calibration
  n_lidar_points: null               # LiDAR cluster points used to compute the median
