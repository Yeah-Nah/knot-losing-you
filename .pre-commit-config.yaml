repos:
  # Ruff - Fast Python linter & formatter
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.14
    hooks:
      - id: ruff-check
        args: [--fix]  # Auto-fix issues when possible
      - id: ruff-format

  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace  # Remove trailing spaces
      - id: end-of-file-fixer    # Ensure files end with newline
      - id: check-yaml           # Validate YAML syntax
      - id: check-merge-conflict # Catch merge conflict markers

  # Jupyter notebooks - Strip outputs
  - repo: https://github.com/kynan/nbstripout
    rev: 0.8.1
    hooks:
      - id: nbstripout

  # Jupyter notebooks - Lint
  - repo: https://github.com/nbQA-dev/nbQA
    rev: 1.9.1
    hooks:
      - id: nbqa-ruff
        args: [--fix]

  # Type checking - ugv-follower
  - repo: local
    hooks:
      - id: pyright
        name: pyright (ugv-follower)
        language: python
        entry: pyright
        pass_filenames: false
        args: [--project, ugv-follower]
        files: ^ugv-follower/
        additional_dependencies:
          - pyright
          - depthai
          - pytest
          - pyserial
          - numpy
          - opencv-python-headless
          - PyYAML
          - loguru
          - types-PyYAML
          - types-setuptools
